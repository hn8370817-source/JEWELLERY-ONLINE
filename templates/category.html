{% extends "base.html" %}
{% block content %}
<h2 class="mb-4">{{ category.name }}</h2>
<div class="row">
    {% for product in products %}
    <div class="col-md-4 col-sm-6 mb-4">
        <div class="card product-card h-100 shadow-sm">
            <img src="{{ product.images[0].url if product.images else '' }}" class="card-img-top" alt="{{ product.name }}" style="height:250px; object-fit:cover;">
            <div class="card-body">
                <h5>{{ product.name }}</h5>
                <p>₹{{ product.price }}</p>
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        {% if product.stock > 0 %}
                        <span class="badge bg-success">In Stock</span>
                        {% else %}
                        <span class="badge bg-danger">Out of Stock</span>
                        {% endif %}
                    </div>
                    <button class="btn btn-outline-secondary btn-sm quick-view-btn" data-product-id="{{ product.id }}">
                        <i class="fas fa-eye"></i> Quick View
                    </button>
                </div>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
