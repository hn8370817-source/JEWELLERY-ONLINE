{% extends "base.html" %}
{% block content %}
<h2>My Wishlist</h2>
{% if items %}
<div class="row">
    {% for item in items %}
    <div class="col-md-3 mb-3">
        <div class="card h-100">
            <img src="{{ item.product.images[0].url if item.product.images else '' }}" class="card-img-top" style="height:200px; object-fit:cover;">
            <div class="card-body">
                <h6>{{ item.product.name }}</h6>
                <p>₹{{ item.product.price }}</p>
                <form method="POST" action="{{ url_for('remove_from_wishlist', item_id=item.id) }}">
                    <button class="btn btn-sm btn-outline-danger"><i class="fas fa-heart-broken"></i> Remove</button>
                </form>
                <a href="{{ url_for('product', prod_id=item.product.id) }}" class="btn btn-sm btn-outline-dark mt-1">View</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% else %}
<p>Your wishlist is empty.</p>
{% endif %}
{% endblock %}
